<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Portfolio</title>

<style>
body{
    margin:0;
    font-family:Poppins, sans-serif;
    background:#0f172a;
    color:white;
}

.header{
    text-align:center;
    padding:60px 20px;
}

.header h1{
    font-size:40px;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
    gap:20px;
}

.card{
    background:#1f2937;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card p{
    padding:15px;
}

.back{
    display:inline-block;
    margin:20px 0;
    color:white;
    text-decoration:none;
    background:#16a34a;
    padding:10px 20px;
    border-radius:30px;
}
</style>
</head>

<body>

<div class="header">
    <h1>My Creative Portfolio</h1>
    <p>Graphic Design • UI/UX • Branding</p>
</div>

<div class="container">

    <a class="back" href="resume.html">← Back to Resume</a>

    <div class="grid">

        <div class="card">
            <img src="https://via.placeholder.com/400x300" alt="">
            <p>Sample Logo Design</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/400x300" alt="">
            <p>Poster Design</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/400x300" alt="">
            <p>UI Concept</p>
        </div>

    </div>

</div>

</body>
</html>
